<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skills | Didula Daluwaththa</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    /* Mobile Polish */
    html { scroll-behavior: smooth; -webkit-tap-highlight-color: transparent; }
    body { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); padding-left: env(safe-area-inset-left); padding-right: env(safe-area-inset-right); }
  </style>
</head>
<body class="min-h-screen flex flex-col bg-gray-950 text-white">
  <div id="navbar-placeholder"></div>
  <main class="flex-1">
    <div class="bg-gradient-to-br from-gray-900 via-slate-800 to-gray-900 py-12 md:py-16 min-h-screen">
      <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center space-x-3 mb-4">
          <i data-lucide="cpu" class="w-6 h-6 md:w-8 md:h-8 text-cyan-400"></i>
          <h1 class="text-3xl md:text-4xl font-bold text-white font-mono">
            <span class="text-cyan-400">&lt;</span>Skills<span class="text-cyan-400">/&gt;</span>
          </h1>
        </div>
        <p class="text-gray-400 mb-8 md:mb-12">A comprehensive overview of my technical and soft skills.</p>

        <div class="mb-12 md:mb-16">
          <h2 class="text-xl md:text-2xl font-semibold text-white mb-6">Technical Skills</h2>
          <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-gradient-to-br from-slate-800 to-slate-900 rounded-xl border border-cyan-500/20 p-6">
              <div class="bg-cyan-500/10 w-12 h-12 rounded-lg flex items-center justify-center mb-4">
                <i data-lucide="code-2" class="w-6 h-6 text-cyan-400"></i>
              </div>
              <h3 class="font-semibold text-lg mb-4 text-white">Programming</h3>
              <div class="flex flex-wrap gap-2">
                <span class="px-3 py-1 text-xs md:text-sm font-medium rounded-full bg-cyan-500/10 text-cyan-400 border border-cyan-500/30 font-mono">Python</span>
                <span class="px-3 py-1 text-xs md:text-sm font-medium rounded-full bg-cyan-500/10 text-cyan-400 border border-cyan-500/30 font-mono">SQL</span>
                <span class="px-3 py-1 text-xs md:text-sm font-medium rounded-full bg-cyan-500/10 text-cyan-400 border border-cyan-500/30 font-mono">C#</span>
              </div>
            </div>
            <div class="bg-gradient-to-br from-slate-800 to-slate-900 rounded-xl border border-cyan-500/20 p-6">
              <div class="bg-green-500/10 w-12 h-12 rounded-lg flex items-center justify-center mb-4">
                <i data-lucide="database" class="w-6 h-6 text-green-400"></i>
              </div>
              <h3 class="font-semibold text-lg mb-4 text-white">Database</h3>
              <div class="flex flex-wrap gap-2">
                <span class="px-3 py-1 text-xs md:text-sm font-medium rounded-full bg-cyan-500/10 text-cyan-400 border border-cyan-500/30 font-mono">MySQL</span>
                <span class="px-3 py-1 text-xs md:text-sm font-medium rounded-full bg-cyan-500/10 text-cyan-400 border border-cyan-500/30 font-mono">MS SQL Server</span>
              </div>
            </div>
            <div class="bg-gradient-to-br from-slate-800 to-slate-900 rounded-xl border border-cyan-500/20 p-6">
              <div class="bg-purple-500/10 w-12 h-12 rounded-lg flex items-center justify-center mb-4">
                <i data-lucide="globe" class="w-6 h-6 text-purple-400"></i>
              </div>
              <h3 class="font-semibold text-lg mb-4 text-white">Web Dev</h3>
              <div class="flex flex-wrap gap-2">
                <span class="px-3 py-1 text-xs md:text-sm font-medium rounded-full bg-cyan-500/10 text-cyan-400 border border-cyan-500/30 font-mono">HTML/CSS</span>
                <span class="px-3 py-1 text-xs md:text-sm font-medium rounded-full bg-cyan-500/10 text-cyan-400 border border-cyan-500/30 font-mono">JavaScript</span>
                <span class="px-3 py-1 text-xs md:text-sm font-medium rounded-full bg-cyan-500/10 text-cyan-400 border border-cyan-500/30 font-mono">Bootstrap</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
  <div id="footer-placeholder"></div>
  <script src="main.js"></script>
</body>
</html>
